name: Build Android APK
on:
  push:
    branches: [ main ] # Change this to your branch name

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
       
      - name: Checkout Source
        uses: actions/checkout@v4

      # ADD THIS STEP BELOW
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' # This fixes the [fatal] error

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install PNPM # Or use 'npm' if you prefer
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install Dependencies
        run: pnpm install

      - name: Build Web Assets
        run: pnpm run generate # Ensure this matches your package.json build script

      - name: Capacitor Sync
        run: npx cap sync android

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk